# ============================================================================
# UNIVERSAL TMUX CONFIGURATION
# ============================================================================
# This file contains settings that work across all platforms (macOS, Linux)
# OS/Wayland-specific tool initialization is deferred to included files

# ============================================================================
# BASIC SETTINGS
# ============================================================================

# Use Vi keybindings in copy mode (makes sense for the vim crowd)
set -g mode-keys vi

# Increase scroll history
set -g history-limit 50000

# Enable true color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:RGB"

# Enable mouse mode for clicking, scrolling, resizing
set -g mouse on

# Faster escape key response (important for nested tmux/vim)
set -g escape-time 50

# Focus events for better terminal support
set -g focus-events on

# Automatic window renaming based on the program running
setw -g automatic-rename on

# ============================================================================
# KEYBINDINGS
# ============================================================================

# Rebind prefix from Ctrl+b to Ctrl+b (we'll add zellij-shortcut plugin for modal keys)
# For now, keeping default Ctrl+b; zellij-shortcut will add Ctrl+p, Ctrl+t, etc.

# Paste from tmux buffer with a simple key
bind P paste-buffer

# ============================================================================
# COPY MODE (VI-STYLE)
# ============================================================================
# These keybindings work in copy mode (entered with Ctrl+b [)
# We'll set up mouse drag auto-copy in OS-specific files

# Start selection with 'v' (like Vim)
bind -T copy-mode-vi v send -X begin-selection

# Extend selection with 'V' (select line)
bind -T copy-mode-vi V send -X select-line

# Block selection with Ctrl+v
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Copy with 'y' - we'll use OS-specific clipboard command (set in platform files)
# This is overridden per-OS in tmux.conf.macos / tmux.conf.linux

# Keyboard-based search
bind -T copy-mode-vi / command-prompt -p "(search down)" "send -X search-forward '%%'"
bind -T copy-mode-vi ? command-prompt -p "(search up)" "send -X search-backward '%%'"

# ============================================================================
# PANE STYLING
# ============================================================================
# Show visible pane borders; colors come from catppuccin plugin

set -g pane-border-status off
set -g pane-border-lines simple

# ============================================================================
# STATUS BAR
# ============================================================================
# We'll customize this with the catppuccin/tmux plugin
# Default position: bottom of screen
set -g status-position bottom

# ============================================================================
# PLUGIN MANAGER & PLUGINS
# ============================================================================
# Tmux Plugin Manager (TPM) - install plugins here
set -g @plugin 'tmux-plugins/tpm'

# Catppuccin color theme for tmux
set -g @plugin 'catppuccin/tmux'

# Zellij-style modal keybindings with discoverable status bar
set -g @plugin 'nyanko3141592/tmux-zellij-shortcut'

# Catppuccin config - use mocha flavor (matches your starship prompt)
set -g @catppuccin_flavor 'mocha'

# ============================================================================
# PLATFORM-SPECIFIC OVERRIDES
# ============================================================================
# Load OS-specific config for clipboard handling, shell paths, etc.

if-shell 'uname | grep -q Darwin' {
  source-file ~/.config/tmux/tmux.conf.macos
} {
  source-file ~/.config/tmux/tmux.conf.linux
}

# Hostname-specific config (useful for server-specific tweaks)
if-shell '[[ -f ~/.config/tmux/tmux.conf.$(hostname) ]]' {
  source-file ~/.config/tmux/tmux.conf.$(hostname)
}

# ============================================================================
# Initialize TPM - this line MUST be at the end
# ============================================================================
run '~/.tmux/plugins/tpm/tpm'
